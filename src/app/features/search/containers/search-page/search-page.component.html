<div class="search-page">
  <div class="search-header">
    <h1>GitHub Repository Search</h1>
    <p class="subtitle">Search and save repositories to your dashboard</p>
  </div>

  <div class="search-controls">
    <app-search-bar
      [sort]="sortBy()"
      [order]="order()"
      (debouncedQueryChange)="onDebouncedQueryChange($event)"
      (sortUpdated)="onSortChange($event)"
      (orderUpdated)="onOrderChange($event)"
    />
  </div>

  <div class="search-results">
    <app-repo-list
      [repos]="repos()"
      [addedIds]="addedIds()"
      [hasMore]="hasMore()"
      [isLoading]="isLoading()"
      (addRepo)="onAddRepo($event)"
      (loadMore)="onLoadMore()"
    />
  </div>
</div>
